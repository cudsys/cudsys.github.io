---
layout: default
---
<link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
<h1>{{ page.name }}</h1>

{{ content }}

<h2>Posts</h2>
<ul>
  {% assign filtered_posts = site.posts | where: 'category', page.name %}
  {% for post in filtered_posts %}
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
  {% endfor %}
</ul>
